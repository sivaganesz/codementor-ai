version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: course-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: course_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: course-platform-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: